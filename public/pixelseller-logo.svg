  <rect x="18"  y="108" width="22" height="12" rx="3" fill="#A78BFA"/>
  <rect x="44"  y="102" width="22" height="18" rx="3" fill="#A78BFA"/>
  <rect x="70"  y="94"  width="22" height="26" rx="3" fill="#F5C200"/>
